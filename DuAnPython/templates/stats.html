<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Thống kê báo cáo</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            background: #eef2f7;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding-bottom: 50px;
        }

        .card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            margin-bottom: 30px;
        }

        .chart-container {
            position: relative;
            margin: auto;
            height: 400px;
            width: 100%;
        }

        h2, h4 {
            color: #334155;
            font-weight: 700;
        }
    </style>
</head>

<body>

<div class="container mt-5">
    <h2 class="text-center mb-5">HỆ THỐNG THỐNG KÊ BÁO CÁO</h2>

    <div class="row">
        <div class="col-md-6">
            <div class="card p-4">
                <h4 class="text-center mb-4">Trạng thái phê duyệt</h4>
                <div class="chart-container">
                    <canvas id="myChart"></canvas>
                </div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card p-4">
                <h4 class="text-center mb-4">Số lượng theo danh mục</h4>
                <div class="chart-container">
                    <canvas id="barChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <div class="text-center mt-4">
        <a href="/" class="btn btn-primary btn-lg px-5 shadow-sm">
            Quay lại trang quản lý
        </a>
    </div>
</div>

<script>
    // 1. Cấu hình Biểu đồ tròn (Trạng thái)
    const ctxPie = document.getElementById('myChart').getContext('2d');
    new Chart(ctxPie, {
        type: 'pie',
        data: {
            labels: ['Chờ duyệt (Pending)', 'Đã duyệt (Approved)'],
            datasets: [{
                data: [{{pending}}, {{approved}}],
                backgroundColor: ['#facc15', '#22c55e'],
                borderWidth: 2,
                borderColor: '#ffffff'
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { position: 'bottom' }
            }
        }
    });

    // 2. Cấu hình Biểu đồ cột (Danh mục)
    // labels và data được lấy từ Flask: labels=list(category_count.keys()), data=list(category_count.values())
    const ctxBar = document.getElementById('barChart').getContext('2d');
    new Chart(ctxBar, {
        type: 'bar',
        data: {
            labels: {{ labels|safe }},
            datasets: [{
                label: 'Số lượng bài',
                data: {{ data|safe }},
                backgroundColor: 'rgba(54, 162, 235, 0.7)',
                borderColor: 'rgba(54, 162, 235, 1)',
                borderWidth: 1
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { display: false }
            },
            scales: {
                y: {
                    beginAtZero: true,
                    ticks: { stepSize: 1 }
                }
            }
        }
    });
</script>

</body>
</html>
